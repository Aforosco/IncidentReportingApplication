services:
  backend:
    build: ./IncidentReportingApplication
    container_name: dotnet_api
    ports:
      - "5206:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=incidentdb;Username=admin;Password=admin123
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./incident-frontend
    container_name: vue_app
    ports:
      - "8080:80"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: incidentdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d incidentdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: